# Console configuration for NVIDIA AST2700 BMC platform
# TODO: Verify CONSOLE_DEV, CONSOLE_SPEED, and EARLYCON on NVIDIA hardware
# linuxargs: console=ttyS12,115200n8 earlycon (see platform/aspeed/scripts/sonic-uboot-env-init.sh)
CONSOLE_DEV=12
CONSOLE_SPEED=115200
EARLYCON="earlycon"

# Variable log size(MB)
VAR_LOG_SIZE=512

# Additional kernel command line arguments
ONIE_PLATFORM_EXTRA_CMDLINE_LINUX=""

# obmc-console server configuration for NVIDIA AST2700 BMC
# NVIDIA-specific configuration

# TODO: Set LPC address for virtual UART (if using LPC-based VUART)
lpc-address = 0x3f8

# TODO: Set serial IRQ number
sirq = 4

# TODO: Set upstream TTY device on BMC side
# Use ttyVUART0 for virtual UART (LPC), or ttyS<N> for physical UART
upstream-tty = ttyVUART0

# TODO: Set local TTY device
local-tty = ttyS0

# TODO: Set baud rate (must match host side)
local-tty-baud = 115200

# Console ID
console-id = host

# Log file for console output
logfile = /var/log/obmc-console-host.log

# Maximum log size (20MB)
logsize = 20971520
